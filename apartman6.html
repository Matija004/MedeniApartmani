<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* TOP */
.top {
  background: #111;
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
}

.top a {
  color: white;
  text-decoration: none;
}

/* SLIDER */
.slider {
  position: relative;
  height: 75vh;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.8s ease;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide.active {
  opacity: 1;
}

.slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* STRELICE */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  z-index: 10;
}

.left { left: 10px; }
.right { right: 10px; }

/* THUMBNAILS */
.thumbs {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: white;
  overflow-x: auto;
}

.thumbs img {
  width: 110px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  flex-shrink: 0;
}

/* CONTENT */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

.icons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.icon {
  background: #eee;
  padding: 8px 12px;
  border-radius: 8px;
}

/* BOOKING */
.booking {
  background: #1877F2;
  text-align: center;
  padding: 18px;
  border-radius: 12px;
  margin-top: 25px;
}

.booking a {
  color: white;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
}

/* FOOTER */
.footer {
  background: #111;
  color: white;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
  text-align: center;
  margin-top: 60px;
}

.social-icons a {
  color: white;
  font-size: 26px;
  margin: 0 10px;
}

/* FULLSCREEN GALERIJA */
.fullscreen-gallery {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.fullscreen-gallery img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
}

.close-gallery {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 40px;
  cursor: pointer;
}

.gallery-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 35px;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

.gallery-left {
  left: 20px;
}

.gallery-right {
  right: 20px;
}
</style>

<script>
/* GORNJI SLIDER */
const slides = document.querySelectorAll(".slide");
let current = 0;

let interval = setInterval(next, 3000);

function show(i){
  slides.forEach(slide => {
    slide.classList.remove("active");
  });

  slides[i].classList.add("active");
}

function next(){
  current = (current + 1) % slides.length;
  show(current);
}

function change(dir){
  clearInterval(interval);

  current += dir;

  if(current < 0){
    current = slides.length - 1;
  }

  if(current >= slides.length){
    current = 0;
  }

  show(current);

  interval = setInterval(next, 3000);
}

/* DONJA FULLSCREEN GALERIJA */
const galleryImages = [
  "slike/Veliki/1.JPG",
  "slike/Veliki/2.jpg",
  "slike/Veliki/3.JPG",
  "slike/Veliki/4.JPG",
  "slike/Veliki/5.JPG",
  "slike/Veliki/6.JPG",
  "slike/Veliki/7.JPG",
  "slike/Veliki/8.JPG",
  "slike/Veliki/9.jpg",
  "slike/Veliki/10.JPG",
  "slike/Veliki/11.JPG",
  "slike/Veliki/12.JPG",
  "slike/Veliki/13.JPG",
  "slike/Veliki/14.JPG",
  "slike/Veliki/15.jpg",
  "slike/Veliki/16.JPG",
  "slike/Veliki/17.jpg",
  "slike/Veliki/18.JPG"
];

let galleryCurrent = 0;

function openGallery(index){
  galleryCurrent = index;

  document.getElementById("gallery").style.display = "flex";

  document.getElementById("galleryImage").src =
    galleryImages[index];
}

function closeGallery(){
  document.getElementById("gallery").style.display = "none";
}

function galleryChange(dir){
  galleryCurrent += dir;

  if(galleryCurrent < 0){
    galleryCurrent = galleryImages.length - 1;
  }

  if(galleryCurrent >= galleryImages.length){
    galleryCurrent = 0;
  }

  document.getElementById("galleryImage").src =
    galleryImages[galleryCurrent];
}
</script>
